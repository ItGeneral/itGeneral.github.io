<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JSON Online Parser</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <div class="header-text">
          <h1 data-i18n="title">JSON Online Parser</h1>
          <h2 data-i18n="subtitle">Format, compress, and validate JSON data</h2>
        </div>
        <select id="langSelect" class="lang-select" aria-label="Language">
          <option value="en">English</option>
          <option value="zh">中文</option>
        </select>
      </div>
    </header>

    <main class="main-content">
      <div class="input-panel">
        <textarea id="input" data-i18n-placeholder="inputPlaceholder" placeholder="Enter JSON string here...&#10;&#10;Example:&#10;{&#10;  &quot;name&quot;: &quot;John&quot;,&#10;  &quot;age&quot;: 30&#10;}"></textarea>
      </div>

      <div class="output-panel">
        <div class="output-container">
          <div class="line-numbers"></div>
          <pre><code id="output" class="language-json"></code></pre>
        </div>
      </div>
    </main>

    <div class="toolbar">
      <div class="toolbar-left">
        <button id="formatBtn" class="primary" data-i18n="format" aria-label="Format JSON">Format</button>
        <button id="validateBtn" class="secondary" data-i18n="validate" aria-label="Validate JSON syntax">Validate</button>
        <button id="clearBtn" class="danger" data-i18n="clear" aria-label="Clear all content">Clear</button>
        <button id="sampleBtn" class="secondary" data-i18n="sample" aria-label="Load sample data">Sample</button>
      </div>
      <div class="toolbar-right">
        <button id="compressBtn" class="secondary" data-i18n="compress" aria-label="Compress JSON">Compress</button>
        <button id="copyBtn" class="secondary" data-i18n="copy" aria-label="Copy to clipboard">Copy</button>
      </div>
    </div>

    <footer class="status-bar">
      <div class="status-message" id="statusMessage" role="status" aria-live="polite" data-i18n="ready">Ready</div>
      <div class="stats" id="stats" aria-label="Statistics"></div>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
