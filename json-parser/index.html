<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JSON Online Parser</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- Toolbar at the top -->
    <div class="toolbar">
      <div class="toolbar-left">
        <button id="formatBtn" class="btn btn-primary" data-i18n="format" aria-label="Format JSON">Format</button>
        <button id="validateBtn" class="btn btn-secondary" data-i18n="validate" aria-label="Validate JSON syntax">Validate</button>
        <button id="clearBtn" class="btn btn-danger" data-i18n="clear" aria-label="Clear all content">Clear</button>
      </div>
      <div class="toolbar-right">
        <button id="compressBtn" class="btn btn-secondary" data-i18n="compress" aria-label="Compress JSON">Compress</button>
        <button id="copyBtn" class="btn btn-secondary" data-i18n="copy" aria-label="Copy to clipboard">Copy</button>
      </div>
    </div>

    <main class="main-content">
      <div class="input-panel">
        <textarea id="input" data-i18n-placeholder="inputPlaceholder" placeholder="Enter JSON string here...&#10;&#10;Example:&#10;{&#10;  &quot;name&quot;: &quot;John&quot;,&#10;  &quot;age&quot;: 30&#10;}">{
  "name": "John",
  "age": 30,
  "city": "New York",
  "hobbies": ["reading", "gaming", "coding"],
  "address": {
    "street": "123 Main St",
    "zipCode": "10001"
  },
  "isActive": true,
  "balance": 1234.56
}</textarea>
      </div>

      <div class="output-panel">
        <div class="output-container">
          <div class="line-numbers"></div>
          <pre><code id="output" class="language-json"></code></pre>
        </div>
      </div>
    </main>

    <footer class="status-bar">
      <div class="status-message" id="statusMessage" role="status" aria-live="polite" data-i18n="ready">Ready</div>
      <div class="stats" id="stats" aria-label="Statistics"></div>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
