<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 工具箱主体 -->
  <rect x="15" y="40" width="70" height="45" rx="5" fill="#5DADE2" stroke="#333" stroke-width="3"/>
  <!-- 工具箱盖子 -->
  <rect x="12" y="32" width="76" height="12" rx="3" fill="#85C1E9" stroke="#333" stroke-width="3"/>
  <!-- 手柄 -->
  <rect x="40" y="20" width="20" height="15" rx="3" fill="#333"/>
  <rect x="45" y="18" width="10" height="5" rx="2" fill="#666"/>
  <!-- 锁扣 -->
  <rect x="45" y="38" width="10" height="8" rx="2" fill="#FFD700" stroke="#333" stroke-width="1.5"/>
  <!-- 装饰线条 -->
  <line x1="25" y1="55" x2="35" y2="55" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="65" x2="30" y2="65" stroke="#333" stroke-width="2" stroke-linecap="round"/>
</svg>
